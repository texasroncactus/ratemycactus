<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cactus Viewer 95</title>
<style>
  /* The Classic Windows Teal */
  body {
    background-color: #008080;
    font-family: "Tahoma", "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }

  /* The Main Window Container */
  .window {
    width: 400px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    box-shadow: 1px 1px 0 0 #000;
    padding: 2px;
  }

  /* Title Bar */
  .title-bar {
    background: linear-gradient(90deg, #000080, #1084d0);
    padding: 3px 5px 3px 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    font-weight: bold;
    font-size: 13px;
  }

  .title-bar-controls button {
    width: 16px;
    height: 14px;
    font-size: 9px;
    padding: 0;
    background: #c0c0c0;
    border: 1px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    cursor: pointer;
  }

  /* Content Area */
  .window-body {
    padding: 15px;
    text-align: center;
  }

  .image-container {
    background: #000;
    border: 2px solid;
    border-color: #808080 #ffffff #ffffff #808080;
    margin-bottom: 10px;
    padding: 2px;
    min-height: 200px;
  }

  .image-container img {
    max-width: 100%;
    display: block;
  }

  /* Retro Buttons */
  button.win95-btn {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
    outline: none;
    margin: 2px;
  }

  button.win95-btn:active {
    border-color: #808080 #ffffff #ffffff #808080;
    padding: 5px 9px 3px 11px;
  }

  .rating-display {
    background: #ffffff;
    border: 2px solid;
    border-color: #808080 #ffffff #ffffff #808080;
    padding: 5px;
    margin: 10px 0;
    font-family: 'Courier New', monospace;
    font-weight: bold;
  }

  .hidden { display: none; }

  h2 { font-size: 16px; margin-top: 0; }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">🌵 CactusViewer.exe</div>
    <div class="title-bar-controls">
      <button>_</button>
      <button>□</button>
      <button>X</button>
    </div>
  </div>

  <div class="window-body">
    <h2>Rate this Succulent!</h2>
    
    <div class="cactus-box" id="box-1" data-id="texasron_cactus1">
      <div class="image-container">
        <img src="cactus1.jpg" alt="Cactus 1">
      </div>
      <div class="rating-display">Score: <span class="avg">0.00</span></div>
      <div class="buttons"></div>
    </div>

    <div class="cactus-box hidden" id="box-2" data-id="texasron_cactus2">
      <div class="image-container">
        <img src="cactus2.jpg" alt="Cactus 2">
      </div>
      <div class="rating-display">Score: <span class="avg">0.00</span></div>
      <div class="buttons"></div>
    </div>

    <hr style="border: 1px inset #fff; margin: 15px 0;">
    
    <button id="next-btn" class="win95-btn" style="width: 100%; font-weight: bold;" disabled>Next Cactus >> </button>
  </div>
</div>

<script>
const API_BASE = "https://texasron.texasroncactus.workers.dev/api"; 
const NAMESPACE = "texas-rons-team-3349";

let currentCactusIndex = 0;
const boxes = document.querySelectorAll(".cactus-box");
const nextBtn = document.getElementById("next-btn");

// Initialize Buttons and Load Initial Ratings
boxes.forEach((box, index) => {
  const id = box.dataset.id;
  const btnContainer = box.querySelector(".buttons");

  for (let i = 1; i <= 5; i++) { // Shorter range for UI fit
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "win95-btn";
    btn.onclick = () => vote(id, i, box);
    btnContainer.appendChild(btn);
  }

  loadRating(id, box);
});

async function vote(id, score, box) {
  try {
    await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total/up`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: score })
    });
    await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes/up`, { method: "POST" });
    
    // Refresh rating and enable the "Next" button
    await loadRating(id, box);
    nextBtn.disabled = false;
  } catch (err) {
    console.error("Vote failed", err);
  }
}

async function loadRating(id, box) {
  try {
    const totalRes = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total`);
    const votesRes = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes`);
    const total = (await totalRes.json()).count || 0;
    const votes = (await votesRes.json()).count || 0;
    const avg = votes === 0 ? "0.00" : (total / votes).toFixed(2);
    box.querySelector(".avg").innerText = avg;
  } catch (err) {
    console.error("Load failed", err);
  }
}

// Next Button Logic
nextBtn.addEventListener("click", () => {
  boxes[currentCactusIndex].classList.add("hidden");
  currentCactusIndex = (currentCactusIndex + 1) % boxes.length;
  boxes[currentCactusIndex].classList.remove("hidden");
  nextBtn.disabled = true; // Lock until they vote on the new one
});
</script>

</body>
</html>
