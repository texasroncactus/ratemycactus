<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌵 RateMyCactus.com - GLOBAL EDITION 🌵</title>
    <style>
        body { 
            background-color: #008080; 
            background-image: url('https://www.transparenttextures.com/patterns/cubes.png'); 
            font-family: "Comic Sans MS", sans-serif; 
            color: #fff; 
            text-align: center; 
            padding: 20px; 
        }
        #main-window { 
            background-color: #c0c0c0; 
            color: #000; 
            width: 95%; 
            max-width: 500px; 
            margin: 0 auto; 
            border: 3px ridge #fff; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5); 
        }
        .title-bar { 
            background: linear-gradient(90deg, #000080, #1084d0); 
            color: white; 
            padding: 5px 10px; 
            display: flex; 
            justify-content: space-between; 
            font-size: 14px; 
        }
        .content { padding: 20px; }
        .cactus-display { 
            background: #fff; 
            border: 2px inset #eee; 
            padding: 10px; 
            margin-bottom: 15px; 
        }
        #cactus-img { 
            width: 100%; 
            height: 300px; 
            object-fit: contain; 
            border: 1px solid #000; 
            background: #333; 
        }
        .score-box { 
            background: #ffff00; 
            border: 2px dashed #ff0000; 
            padding: 10px; 
            margin: 10px 0; 
            font-size: 1.5em; 
            font-weight: bold; 
        }
        .btn-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 5px; 
        }
        button { 
            cursor: pointer; 
            background: #d4d0c8; 
            border: 2px outset #fff; 
            font-weight: bold; 
            padding: 10px 2px; 
        }
        button:active { border: 2px inset #fff; }
        #next-btn { 
            display: none; 
            width: 100%; 
            background: #00ff00; 
            color: #000; 
            font-size: 1.2em; 
            margin-top: 10px; 
            padding: 15px; 
            border: 3px outset #fff; 
            cursor: pointer; 
        }
    </style>
</head>
<body>

    <div id="main-window">
        <div class="title-bar"><span>CactusVote_Global.exe</span><span>[X]</span></div>
        <div class="content">
            <div id="nav-info" style="font-size: 12px; margin-bottom: 5px;"></div>
            <div class="cactus-display">
                <img id="cactus-img" src="" alt="Cactus">
                <h2 id="cactus-name">---</h2>
            </div>

            <div id="rating-ui">
                <strong>Global Rating:</strong>
                <div class="btn-grid">
                    <button onclick="castVote(1)">1</button>
                    <button onclick="castVote(2)">2</button>
                    <button onclick="castVote(3)">3</button>
                    <button onclick="castVote(4)">4</button>
                    <button onclick="castVote(5)">5</button>
                    <button onclick="castVote(6)">6</button>
                    <button onclick="castVote(7)">7</button>
                    <button onclick="castVote(8)">8</button>
                    <button onclick="castVote(9)">9</button>
                    <button onclick="castVote(10)">10</button>
                </div>
            </div>

            <div id="stats-ui" style="display:none;">
                <div class="score-box">WORLDWIDE VOTES: <span id="count-display">0</span></div>
                <button id="next-btn" onclick="nextCactus()">NEXT CACTUS >> </button>
            </div>
        </div>
    </div>

<script>
    const NAMESPACE = "texasron_global_cactus_v1";

    const cactusList = [
        { id: "cac1", name: "Cactus #1", img: "1.jpg" },
        { id: "cac2", name: "Cactus #2", img: "2.jpg" }
    ];

    let currentIndex = 0;

    async function loadCactus() {
        const c = cactusList[currentIndex];
        document.getElementById('cactus-img').src = c.img; 
        document.getElementById('cactus-name').innerText = c.name;
        document.getElementById('nav-info').innerText = `CACTUS ${currentIndex + 1} OF ${cactusList.length}`;
        
        document.getElementById('rating-ui').style.display = 'block';
        document.getElementById('stats-ui').style.display = 'none';
        
        try {
            const res = await fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/${c.id}`);
            const data = await res.json();
            document.getElementById('count-display').innerText = data.value || 0;
        } catch (e) {
            document.getElementById('count-display').innerText = "0";
        }
    }

    async function castVote(score) {
        const c = cactusList[currentIndex];
        try {
            const res = await fetch(`https://api.counterapi.dev/v1/${NAMESPACE}/${c.id}/up`);
            const data = await res.json();
            document.getElementById('count-display').innerText = data.value;
            
            document.getElementById('rating-ui').style.display = 'none';
            document.getElementById('stats-ui').style.display = 'block';
            document.getElementById('next-btn').style.display = 'block';
        } catch (e) {
            alert("Connection error!");
        }
    }

    function nextCactus() {
        currentIndex = (currentIndex + 1) % cactusList.length;
        loadCactus();
    }

    loadCactus();
</script>
</body>
</html>
