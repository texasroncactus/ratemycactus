<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🌵 Rate My Cactus 🌵</title>
<style>
  body {
    background: black;
    color: #00FF00;
    font-family: "Courier New", monospace;
    text-align: center;
  }
  h1 {
    color: #FF00FF;
    text-shadow: 2px 2px #00FFFF;
    font-size: 3em;
    margin-bottom: 10px;
  }
  .cactus-box {
    border: 2px dashed #FF00FF;
    display: inline-block;
    margin: 20px;
    padding: 20px;
    width: 300px;
  }
  .cactus-box img {
    width: 100%;
    border: 4px solid #00FF00;
  }
  .buttons button {
    margin: 3px;
    background: black;
    color: #00FFFF;
    border: 1px solid #00FFFF;
    cursor: pointer;
    font-weight: bold;
  }
  .buttons button:hover {
    color: #FF00FF;
    border-color: #FF00FF;
  }
  .avg {
    font-weight: bold;
    color: #FFFF00;
  }
</style>
</head>
<body>

<h1>🌵 RATE MY CACTUS 🌵</h1>

<div class="cactus-box" data-id="texasron_cactus1">
  <img src="cactus1.jpg" alt="Cactus 1">
  <p>Average Rating: <span class="avg">Loading...</span></p>
  <div class="buttons"></div>
</div>

<div class="cactus-box" data-id="texasron_cactus2">
  <img src="cactus2.jpg" alt="Cactus 2">
  <p>Average Rating: <span class="avg">Loading...</span></p>
  <div class="buttons"></div>
</div>

<script>
const API_BASE = "https://texasron.texasroncactus.workers.dev/api"; // <-- your Worker URL
const NAMESPACE = "texas-rons-team-3349";

document.querySelectorAll(".cactus-box").forEach(box => {
  const id = box.dataset.id;
  const btnContainer = box.querySelector(".buttons");

  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => vote(id, i, box);
    btnContainer.appendChild(btn);
  }

  loadRating(id, box);
});

async function vote(id, score, box) {
  try {
    // Use POST to correctly send the score
    await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total/up`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: score })
    });

    await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes/up`, { method: "POST" });

    alert("Thanks for rating! 🌵");

    loadRating(id, box);
  } catch (err) {
    console.error("Vote failed", err);
  }
}

async function loadRating(id, box) {
  try {
    const totalRes = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total`);
    const votesRes = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes`);

    const total = (await totalRes.json()).count || 0;
    const votes = (await votesRes.json()).count || 0;

    const avg = votes === 0 ? "No votes yet" : (total / votes).toFixed(2);
    box.querySelector(".avg").innerText = avg;
  } catch (err) {
    console.error("Load failed", err);
  }
}
</script>

</body>
</html>
