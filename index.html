<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cactus Viewer 95</title>
    <style>
        body { background-color: #008080; font-family: "Tahoma", sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .window { width: 400px; background: #c0c0c0; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; box-shadow: 1px 1px 0 0 #000; padding: 2px; position: relative; }
        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); padding: 3px 5px; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: bold; font-size: 13px; height: 18px; }
        .title-bar-controls { display: flex; gap: 2px; }
        .title-bar-controls button { width: 16px; height: 14px; font-size: 10px; background: #c0c0c0; border: 1px solid; border-color: #ffffff #808080 #808080 #ffffff; display: flex; justify-content: center; align-items: center; padding: 0; }
        .window-body { padding: 15px; text-align: center; }
        .image-container { background: #000; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; margin-bottom: 10px; height: 200px; display: flex; justify-content: center; align-items: center; color: #fff; font-size: 10px; }
        .image-container img { max-width: 100%; max-height: 100%; }
        .rating-display { background: #ffffff; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; padding: 5px; margin: 10px 0; font-family: 'Courier New', monospace; font-weight: bold; }
        .win95-btn { background: #c0c0c0; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; padding: 4px 10px; cursor: pointer; font-size: 12px; }
        .win95-btn:active { border-color: #808080 #ffffff #ffffff #808080; padding: 5px 9px 3px 11px; }
        .win95-btn:disabled { color: #808080; }
        .hidden { display: none; }
        #msg-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 220px; z-index: 1000; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); border: 2px solid #fff; }
    </style>
</head>
<body>

<div class="window">
    <div class="title-bar">
        <span>🌵 CactusViewer.exe</span>
        <div class="title-bar-controls"><button>_</button><button>□</button><button>X</button></div>
    </div>

    <div class="window-body">
        <div class="cactus-box" id="box-1" data-id="texasron_cactus1">
            <div class="image-container">
                <img src="cactus1.jpg" alt="[Image Not Found]">
            </div>
            <div class="rating-display">Avg: <span class="avg">0.00</span></div>
            <div class="btn-group"></div>
        </div>

        <div class="cactus-box hidden" id="box-2" data-id="texasron_cactus2">
            <div class="image-container"><img src="cactus2.jpg" alt="[Image Not Found]"></div>
            <div class="rating-display">Avg: <span class="avg">0.00</span></div>
            <div class="btn-group"></div>
        </div>

        <button id="next-btn" class="win95-btn" style="width:100%; margin-top:15px; font-weight:bold" disabled>Next Cactus >> </button>
    </div>

    <div id="msg-box" class="window hidden">
        <div class="title-bar"><span id="msg-title">Message</span></div>
        <div class="window-body">
            <p id="msg-text" style="margin: 0 0 10px 0; font-size: 12px;">Vote Received!</p>
            <button class="win95-btn" onclick="closeAlert()">OK</button>
        </div>
    </div>
</div>

<script>
    // Verify this URL - your 404s suggest the endpoint might be /api/v1/ or /v1/
    const API_BASE = "https://texasron.texasroncactus.workers.dev/api"; 
    const NAMESPACE = "texas-rons-team-3349";
    let currentIdx = 0;
    const boxes = document.querySelectorAll(".cactus-box");
    const nextBtn = document.getElementById("next-btn");

    function showAlert(text, title = "Message") {
        document.getElementById('msg-text').innerText = text;
        document.getElementById('msg-title').innerText = title;
        document.getElementById('msg-box').classList.remove('hidden');
    }

    function closeAlert() { 
        document.getElementById('msg-box').classList.add('hidden'); 
    }

    async function loadRating(id, box) {
        const avgSpan = box.querySelector(".avg");
        try {
            const cacheBuster = `?t=${Date.now()}`;
            // Fetching the counts
            const tRes = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total${cacheBuster}`);
            const vRes = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes${cacheBuster}`);
            
            const tData = await tRes.json();
            const vData = await vRes.json();

            const total = Number(tData.count) || 0;
            const votes = Number(vData.count) || 0;
            
            const result = votes === 0 ? "0.00" : (total / votes).toFixed(2);
            avgSpan.innerText = result;
            console.log(`ID: ${id} | Total: ${total} | Votes: ${votes} | Avg: ${result}`);
        } catch (e) {
            console.error("Load Error:", e);
        }
    }

    async function handleVote(id, score, box) {
        const btns = box.querySelectorAll(".win95-btn");
        btns.forEach(b => b.disabled = true);
        
        try {
            // Attempt to POST
            const r1 = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total/up`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ amount: score })
            });
            const r2 = await fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes/up`, { method: "POST" });

            if (r1.status === 404 || r2.status === 404) {
                showAlert("Error 404: API endpoint not found. Vote not saved.", "System Error");
                btns.forEach(b => b.disabled = false);
                return;
            }

            showAlert("Vote Recorded! Calculating average...");

            // Wait 500ms for Worker consistency before refreshing math
            setTimeout(async () => {
                await loadRating(id, box);
                nextBtn.disabled = false;
            }, 500);

        } catch (e) {
            showAlert("Connection Failed.", "Error");
            btns.forEach(b => b.disabled = false);
        }
    }

    boxes.forEach(box => {
        const id = box.dataset.id;
        const container = box.querySelector(".btn-group");
        for(let i=1; i<=5; i++) {
            const b = document.createElement("button");
            b.className = "win95-btn";
            b.style.margin = "2px";
            b.innerText = i;
            b.onclick = () => handleVote(id, i, box);
            container.appendChild(b);
        }
        loadRating(id, box);
    });

    nextBtn.onclick = () => {
        boxes[currentIdx].classList.add("hidden");
        currentIdx = (currentIdx + 1) % boxes.length;
        boxes[currentIdx].classList.remove("hidden");
        nextBtn.disabled = true;
    };
</script>

</body>
</html>
