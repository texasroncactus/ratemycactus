<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rate My Cactus 🌵</title>

    <style>
        body {
            background: black;
            color: #00FF00;
            font-family: monospace;
            text-align: center;
        }

        .cactus-box {
            border: 2px dashed #FF00FF;
            padding: 20px;
            margin: 20px;
            display: inline-block;
        }

        button {
            background: black;
            color: #00FFFF;
            border: 1px solid #00FFFF;
            cursor: pointer;
        }

        button:hover {
            color: #FF00FF;
            border-color: #FF00FF;
        }
    </style>
</head>

<body>

<h1>🌵 RATE MY CACTUS 🌵</h1>

<div class="cactus-box" data-id="texasron_cactus1">
    <img src="cactus1.jpg" style="width:250px; border:4px solid #00FF00;">
    <p>Average Rating: <span class="avg">Loading...</span></p>
    <div class="buttons"></div>
</div>

<div class="cactus-box" data-id="texasron_cactus2">
    <img src="cactus2.jpg" style="width:250px; border:4px solid #FF00FF;">
    <p>Average Rating: <span class="avg">Loading...</span></p>
    <div class="buttons"></div>
</div>

<script>
// ========================
// Replace this with your deployed Worker URL
const API_BASE = "https://texasron.texasroncactus.workers.dev/api";
const namespace = "texas-rons-team-3349";

document.querySelectorAll(".cactus-box").forEach(box => {
    const id = box.dataset.id;
    const btnContainer = box.querySelector(".buttons");

    // Create buttons 1–10
    for (let i = 1; i <= 10; i++) {
        let btn = document.createElement("button");
        btn.innerText = i;
        btn.style.margin = "3px";

        btn.onclick = () => vote(id, i, box);
        btnContainer.appendChild(btn);
    }

    loadRating(id, box);
});

// Vote function
async function vote(id, score, box) {
    try {
        console.log("Voting:", id, score);

        await fetch(`${API_BASE}/v1/${namespace}/${id}_total/up?amount=${score}`);
        await fetch(`${API_BASE}/v1/${namespace}/${id}_votes/up`);

        alert("THANKS FOR RATING!!! 🌵");

        loadRating(id, box);
    } catch (err) {
        console.error("Vote failed", err);
    }
}

// Load rating
async function loadRating(id, box) {
    try {
        let totalRes = await fetch(`${API_BASE}/v1/${namespace}/${id}_total`);
        let voteRes = await fetch(`${API_BASE}/v1/${namespace}/${id}_votes`);

        let total = (await totalRes.json()).count || 0;
        let votes = (await voteRes.json()).count || 0;

        let avg = votes === 0 ? "No votes yet" : (total / votes).toFixed(2);

        box.querySelector(".avg").innerText = avg;
    } catch (err) {
        console.error("Load failed", err);
    }
}
</script>

</body>
</html>
