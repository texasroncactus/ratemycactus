<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cactus Viewer 95</title>
<style>
  /* The Classic Windows Teal */
  body {
    background-color: #008080;
    font-family: "Tahoma", "Segoe UI", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    -webkit-font-smoothing: none; /* Helps with that crisp aliased look */
  }

  /* The Main Window Container */
  .window {
    width: 400px;
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    box-shadow: 1px 1px 0 0 #000;
    padding: 2px;
  }

  /* Title Bar Fixes */
  .title-bar {
    background: linear-gradient(90deg, #000080, #1084d0);
    padding: 3px 2px 3px 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: white;
    font-weight: bold;
    font-size: 13px;
    height: 18px;
  }

  .title-bar-text {
    padding-left: 2px;
  }

  .title-bar-controls {
    display: flex;
    gap: 2px;
  }

  .title-bar-controls button {
    width: 16px;
    height: 14px;
    font-size: 11px;
    font-family: "Tahoma", sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 0;
    background: #c0c0c0;
    border: 1px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    cursor: default;
    color: #000;
    font-weight: bold;
    line-height: 0;
  }

  .title-bar-controls button:active {
    border-color: #808080 #ffffff #ffffff #808080;
  }

  /* Content Area */
  .window-body {
    padding: 15px;
    text-align: center;
  }

  .image-container {
    background: #000;
    border: 2px solid;
    border-color: #808080 #ffffff #ffffff #808080;
    margin-bottom: 10px;
    padding: 2px;
    min-height: 200px;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .image-container img {
    max-width: 100%;
    max-height: 300px;
    display: block;
  }

  /* Retro Buttons */
  .buttons {
    margin-top: 10px;
  }

  button.win95-btn {
    background: #c0c0c0;
    border: 2px solid;
    border-color: #ffffff #808080 #808080 #ffffff;
    padding: 4px 12px;
    font-size: 12px;
    font-family: "Tahoma", sans-serif;
    cursor: pointer;
    outline: none;
    margin: 2px;
    min-width: 35px;
  }

  button.win95-btn:active {
    border-color: #808080 #ffffff #ffffff #808080;
    padding: 5px 11px 3px 13px;
  }

  button.win95-btn:disabled {
    color: #808080;
    cursor: default;
  }

  .rating-display {
    background: #ffffff;
    border: 2px solid;
    border-color: #808080 #ffffff #ffffff #808080;
    padding: 5px;
    margin: 10px 0;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    font-size: 14px;
  }

  .hidden { display: none; }
  h2 { font-size: 16px; margin-top: 0; font-weight: normal; }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">
    <div class="title-bar-text">🌵 CactusViewer.exe</div>
    <div class="title-bar-controls">
      <button>_</button>
      <button style="font-size: 9px;">□</button>
      <button>X</button>
    </div>
  </div>

  <div class="window-body">
    <h2>Rate this Succulent!</h2>
    
    <div class="cactus-box" id="box-1" data-id="texasron_cactus1">
      <div class="image-container">
        <img src="cactus1.jpg" alt="Cactus 1">
      </div>
      <div class="rating-display">Avg Score: <span class="avg">Loading...</span></div>
      <div class="buttons"></div>
    </div>

    <div class="cactus-box hidden" id="box-2" data-id="texasron_cactus2">
      <div class="image-container">
        <img src="cactus2.jpg" alt="Cactus 2">
      </div>
      <div class="rating-display">Avg Score: <span class="avg">Loading...</span></div>
      <div class="buttons"></div>
    </div>

    <hr style="border: 0; border-top: 1px solid #808080; border-bottom: 1px solid #fff; margin: 15px 0;">
    
    <button id="next-btn" class="win95-btn" style="width: 100%; font-weight: bold;" disabled>Next Cactus >> </button>
  </div>
</div>

<script>
const API_BASE = "https://texasron.texasroncactus.workers.dev/api"; 
const NAMESPACE = "texas-rons-team-3349";

let currentCactusIndex = 0;
const boxes = document.querySelectorAll(".cactus-box");
const nextBtn = document.getElementById("next-btn");

// Initialize UI
boxes.forEach((box) => {
  const id = box.dataset.id;
  const btnContainer = box.querySelector(".buttons");

  // Create rating buttons 1-5
  for (let i = 1; i <= 5; i++) {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.className = "win95-btn";
    btn.onclick = () => handleVote(id, i, box);
    btnContainer.appendChild(btn);
  }

  loadRating(id, box);
});

async function handleVote(id, score, box) {
  // Disable all buttons in this box while voting to prevent double-clicks
  const btns = box.querySelectorAll(".win95-btn");
  btns.forEach(b => b.disabled = true);
  
  try {
    // 1. Send both score and vote count updates
    const scoreReq = fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total/up`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ amount: score })
    });
    
    const countReq = fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes/up`, { method: "POST" });

    // Wait for both to finish
    await Promise.all([scoreReq, countReq]);

    // 2. Short delay for worker consistency
    await new Promise(r => setTimeout(r, 150));

    // 3. Update the UI
    await loadRating(id, box);
    nextBtn.disabled = false;
  } catch (err) {
    console.error("Vote failed", err);
    btns.forEach(b => b.disabled = false);
  }
}

async function loadRating(id, box) {
  const avgSpan = box.querySelector(".avg");
  try {
    // Cache busting prevents the browser from showing old data
    const cacheBuster = `?t=${Date.now()}`;
    const [totalRes, votesRes] = await Promise.all([
      fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_total${cacheBuster}`),
      fetch(`${API_BASE}/v1/${NAMESPACE}/${id}_votes${cacheBuster}`)
    ]);

    const totalData = await totalRes.json();
    const votesData = await votesRes.json();

    const total = totalData.count || 0;
    const votes = votesData.count || 0;
    
    const avg = votes === 0 ? "0.00" : (total / votes).toFixed(2);
    avgSpan.innerText = avg;
  } catch (err) {
    avgSpan.innerText = "Error";
    console.error("Load failed", err);
  }
}

nextBtn.addEventListener("click", () => {
  boxes[currentCactusIndex].classList.add("hidden");
  currentCactusIndex = (currentCactusIndex + 1) % boxes.length;
  boxes[currentCactusIndex].classList.remove("hidden");
  nextBtn.disabled = true;
});
</script>

</body>
</html>
