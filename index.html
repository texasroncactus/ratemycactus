<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cactus Viewer 95 - Pro Edition</title>
    <style>
        /* Modernized Windows 95 Layout */
        body { 
            background-color: #008080; 
            font-family: "Tahoma", sans-serif; 
            margin: 0; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .desktop-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 25px;
            padding: 40px 20px;
        }

        /* Sidebar Ads */
        .ad-sidebar {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 120px;
            padding-top: 20px;
        }

        .ad-box {
            background: #000;
            border: 2px solid #ffffff;
            outline: 1px solid #000;
            width: 120px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #0f0;
            font-size: 11px;
            text-decoration: none;
            text-align: center;
            font-weight: bold;
        }

        .ad-box:hover { color: #fff; border-color: #0f0; }

        /* MAIN WINDOW (Bigger & Centered) */
        .window { 
            width: 600px; 
            background: #c0c0c0; 
            border: 2px solid; 
            border-color: #ffffff #808080 #808080 #ffffff; 
            box-shadow: 1px 1px 0 0 #000; 
            padding: 2px; 
            position: relative; 
        }

        .title-bar { background: linear-gradient(90deg, #000080, #1084d0); padding: 4px 6px; display: flex; justify-content: space-between; align-items: center; color: white; font-weight: bold; font-size: 14px; height: 22px; }
        .title-bar-controls { display: flex; gap: 2px; }
        .title-bar-controls button { width: 18px; height: 16px; font-size: 10px; background: #c0c0c0; border: 1px solid; border-color: #ffffff #808080 #808080 #ffffff; display: flex; justify-content: center; align-items: center; padding: 0; font-weight: bold; }
        
        .window-body { padding: 20px; text-align: center; }
        
        /* Larger Image Container */
        .image-container { 
            background: #000; 
            border: 2px solid; 
            border-color: #808080 #ffffff #ffffff #808080; 
            margin-bottom: 15px; 
            height: 400px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        .image-container img { max-width: 100%; max-height: 100%; }
        
        .rating-display { background: #ffffff; border: 2px solid; border-color: #808080 #ffffff #ffffff #808080; padding: 12px; margin: 15px 0; font-family: 'Courier New', monospace; font-weight: bold; font-size: 18px; color: #000080; }
        
        .status-bar { border-top: 1px solid #808080; margin-top: 15px; padding-top: 8px; font-size: 12px; text-align: left; color: #444; font-style: italic; }
        
        /* Bigger Buttons */
        .win95-btn { background: #c0c0c0; border: 2px solid; border-color: #ffffff #808080 #808080 #ffffff; padding: 8px 18px; cursor: pointer; font-size: 14px; outline: none; margin: 4px; font-family: "Tahoma"; }
        .win95-btn:active { border-color: #808080 #ffffff #ffffff #808080; padding: 9px 17px 7px 19px; }
        .win95-btn:disabled { color: #808080; cursor: default; text-shadow: 1px 1px #fff; }
        
        .hidden { display: none; }
        #msg-box { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 250px; z-index: 1000; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); border: 2px solid #fff; }

        /* Footer GIF Area (Fixed Overlap) */
        .footer-area {
            margin-top: 20px;
            padding-bottom: 40px;
            text-align: center;
        }

        .gif-link img {
            max-width: 400px; /* Adjust this to fit your banner perfectly */
            image-rendering: pixelated; 
            border: 2px solid #808080; 
            box-shadow: 1px 1px 0 #000;
        }

        .gif-link:hover img { border-color: #ffffff; }
    </style>
</head>
<body>


    <div class="window">
        <div class="title-bar">
            <span>🌵 CactusViewer.exe</span>
            <div class="title-bar-controls"><button>_</button><button>□</button><button>X</button></div>
        </div>
        <div class="window-body">
            <div class="cactus-box" id="box-1" data-id="cactus_master_3">
                <div class="image-container"><img src="graft_tbmaXtpm_3.jpg"></div>
                <div class="rating-display">Global Avg: <span class="avg">0.00</span></div>
                <div class="btn-group"></div>
                <div class="status-bar">Total Votes Cast: <span class="v-count">0</span></div>
            </div>
            
            <div class="cactus-box hidden" id="box-2" data-id="cactus_master_4">
                <div class="image-container"><img src="cactus2.jpg"></div>
                <div class="rating-display">Global Avg: <span class="avg">0.00</span></div>
                <div class="btn-group"></div>
                <div class="status-bar">Total Votes Cast: <span class="v-count">0</span></div>
            </div>
            
            <button id="next-btn" class="win95-btn" style="width:100%; margin-top:15px; font-weight:bold; height: 45px;" disabled>Next Cactus >> </button>
        </div>

        <div id="msg-box" class="window hidden">
            <div class="title-bar"><span>Message</span></div>
            <div class="window-body">
                <p style="font-size: 13px; margin-bottom:15px;">Vote Recorded!</p>
                <button class="win95-btn" onclick="closeAlert()">OK</button>
            </div>
        </div>
    </div>


</div>

<div class="footer-area">
    <a href="https://www.texasroncactus.com" target="_blank" class="gif-link">
        <img src="TexasRonBannerAnimated.gif" alt="Texas Ron Animated Banner">
    </a>
</div>

<script>
    const API_BASE = "https://texasron.texasroncactus.workers.dev/api/v1/texas-rons-team-3349";
    let currentIdx = 0;
    const boxes = document.querySelectorAll(".cactus-box");
    const nextBtn = document.getElementById("next-btn");

    function closeAlert() { document.getElementById('msg-box').classList.add('hidden'); }

    async function getRawData(id) {
        const cb = `?t=${Date.now()}`;
        const [tRes, vRes] = await Promise.all([
            fetch(`${API_BASE}/${id}_total${cb}`),
            fetch(`${API_BASE}/${id}_votes${cb}`)
        ]);
        const tData = await tRes.json();
        const vData = await vRes.json();
        return {
            total: Number(tData.count) || 0,
            votes: Number(vData.count) || 0
        };
    }

    async function loadRating(id, box) {
        const stats = await getRawData(id);
        const result = stats.votes === 0 ? "0.00" : (stats.total / stats.votes).toFixed(2);
        box.querySelector(".avg").innerText = result;
        box.querySelector(".v-count").innerText = stats.votes;
    }

    async function handleVote(id, score, box) {
        const btns = box.querySelectorAll(".win95-btn");
        btns.forEach(b => b.disabled = true);
        
        try {
            const current = await getRawData(id);
            const nextTotal = current.total + Number(score);
            const nextVotes = current.votes + 1;

            await Promise.all([
                fetch(`${API_BASE}/${id}_total/set?count=${nextTotal}`),
                fetch(`${API_BASE}/${id}_votes/set?count=${nextVotes}`)
            ]);

            document.getElementById('msg-box').classList.remove('hidden');

            box.querySelector(".avg").innerText = (nextTotal / nextVotes).toFixed(2);
            box.querySelector(".v-count").innerText = nextVotes;
            nextBtn.disabled = false;

        } catch (e) {
            console.error("Vote Error", e);
            btns.forEach(b => b.disabled = false);
        }
    }

    boxes.forEach(box => {
        const id = box.dataset.id;
        const container = box.querySelector(".btn-group");
        for(let i=1; i<=5; i++) {
            const b = document.createElement("button");
            b.className = "win95-btn";
            b.innerText = i;
            b.onclick = () => handleVote(id, i, box);
            container.appendChild(b);
        }
        loadRating(id, box);
    });

    nextBtn.onclick = () => {
        boxes[currentIdx].classList.add("hidden");
        currentIdx = (currentIdx + 1) % boxes.length;
        boxes[currentIdx].classList.remove("hidden");
        nextBtn.disabled = true;
    };
</script>

</body>
</html>
